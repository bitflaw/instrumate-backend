services:
  instrumate_postgres_db:
    container_name: instrumate_postgres_db
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PSQL_DB_USER}
      POSTGRES_DB: ${PSQL_DB_NAME}
      POSTGRES_PASSWORD: ${PSQL_DB_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_DB_USER} -d ${PSQL_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - instrumate_network
      
    ports:
      - "${PSQL_DB_PORT}:${PSQL_DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  instrumate_redis_cache:
    image: redis:7.4-alpine
    container_name: instrumate_redis_cache
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

    networks:
      - instrumate_network
    volumes:
    - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3


  instrumate_backend_api:
    build: .
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    networks:
      - instrumate_network
    depends_on:
      instrumate_redis_cache:
        condition: service_started
      instrumate_postgres_db:
        condition: service_healthy

networks:
  instrumate_network:
    external: true
    name: instrumate_shared_network     


volumes:
  postgres_data:
  redis_data:
